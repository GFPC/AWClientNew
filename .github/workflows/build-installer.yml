name: Build OTGuru Agent Installer

on:
  # Run automatically after successful app build
  workflow_run:
    workflows: ["Build ActivityWatch Windows EXE"]
    types: [completed]
    branches: [main, master]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of build-aw workflow to use artifacts from (leave empty for latest)'
        required: false

jobs:
  build-installer:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve artifact run ID
        id: resolve_run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi

      - name: Download activitywatch artifact
        uses: actions/download-artifact@v4
        with:
          name: activitywatch-windows-x64
          path: dist/activitywatch
          github-token: ${{ github.token }}
          run-id: ${{ steps.resolve_run.outputs.run_id }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install WiX v4
        run: |
          dotnet tool install --global wix --version "4.0.6"
          wix extension add WixToolset.UI.wixext/4.0.6
          wix extension add WixToolset.Bal.wixext/4.0.6

      - name: Generate file components from dist/activitywatch
        shell: pwsh
        run: |
          $sourceRoot = (Resolve-Path "dist\activitywatch").Path
          $ns = "http://wixtoolset.org/schemas/v4/wxs"

          # Build directory ID map: relative path -> safe XML ID
          $dirMap = @{ "" = "INSTALLFOLDER" }
          $dirIdx = 0
          Get-ChildItem -Path $sourceRoot -Recurse -Directory | Sort-Object FullName | ForEach-Object {
            $rel = $_.FullName.Substring($sourceRoot.Length + 1)
            $dirMap[$rel] = "d$dirIdx"
            $dirIdx++
          }

          $xml = [System.Collections.Generic.List[string]]::new()
          $xml.Add('<?xml version="1.0" encoding="UTF-8"?>')
          $xml.Add("<Wix xmlns=`"$ns`">")
          $xml.Add("  <Fragment>")

          # Emit directory tree under INSTALLFOLDER
          $xml.Add("    <DirectoryRef Id=`"INSTALLFOLDER`">")
          Get-ChildItem -Path $sourceRoot -Recurse -Directory | Sort-Object FullName | ForEach-Object {
            $rel    = $_.FullName.Substring($sourceRoot.Length + 1)
            $id     = $dirMap[$rel]
            $name   = $_.Name
            $depth  = ($rel.Split('\') | Measure-Object).Count + 1
            $pad    = "  " * $depth
            $xml.Add("$pad<Directory Id=`"$id`" Name=`"$name`" />")
          }
          $xml.Add("    </DirectoryRef>")
          $xml.Add("")

          # Emit one component per file, placed in correct directory
          $xml.Add("    <ComponentGroup Id=`"ActivityWatchFiles`">")
          $fileIdx = 0
          Get-ChildItem -Path $sourceRoot -Recurse -File | ForEach-Object {
            $rel    = $_.FullName.Substring($sourceRoot.Length + 1)
            $dirRel = [IO.Path]::GetDirectoryName($rel)
            $dirId  = if ($dirRel) { $dirMap[$dirRel] } else { "INSTALLFOLDER" }
            $xml.Add("      <Component Id=`"c$fileIdx`" Directory=`"$dirId`" Guid=`"*`">")
            $xml.Add("        <File Id=`"f$fileIdx`" Source=`"$($_.FullName)`" />")
            $xml.Add("      </Component>")
            $fileIdx++
          }
          $xml.Add("    </ComponentGroup>")
          $xml.Add("  </Fragment>")
          $xml.Add("</Wix>")

          $xml | Out-File -FilePath "installer\HarvestedFiles.wxs" -Encoding utf8
          Write-Host "Generated $fileIdx file components across $dirIdx directories"

      - name: Build MSI
        run: |
          wix build installer/Product.wxs installer/HarvestedFiles.wxs `
            -ext WixToolset.UI.wixext `
            -o OTGuruAgent.msi

      - name: Build EXE bundle
        run: |
          wix build installer/Bundle.wxs `
            -ext WixToolset.Bal.wixext `
            -o agent_installer.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: otguru-agent-installer
          path: agent_installer.exe
          retention-days: 30
